name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio en el servidor de GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Autenticarse en DockerHub usando los secrets del repositorio
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen apuntando al Dockerfile dentro de la subcarpeta
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest \
            -f PlataformaEducativa/Dockerfile \
            PlataformaEducativa/

      # Paso 4: Subir la imagen construida a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

      # Paso 5: Conectarse por SSH a la EC2 y realizar el despliegue automático
      - name: Deploy to EC2 Instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER_SERVER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Autenticar la instancia de EC2 con DockerHub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 2. Bajar la última versión de la imagen que acabamos de subir
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            
            # 3. Detener y remover contenedores viejos si existen para evitar conflictos de puertos
            docker stop my-app || true
            docker rm my-app || true
            
            # 4. Iniciar el contenedor exponiendo el puerto 8080 de tu app Spring Boot
            docker run -d --name my-app -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
